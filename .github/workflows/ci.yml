name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint + Security — один раннер ────────────────────────────────────────
  checks:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: pip install ruff==0.9.10 pip-audit

      - name: Lint
        run: ruff check backend/

      - name: Security scan
        # CVE-2024-23342, PYSEC-2022-42969 (ecdsa) — транзитивная зависимость python-jose.
        # Обе уязвимости касаются только асимметричных алгоритмов (EC/RSA).
        # Используем исключительно HS256 (симметричный) — риск не применим.
        run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2022-42969 --ignore-vuln CVE-2024-23342

  # ── Tests — нативный pytest, параллельно с docker-build ──────────────────
  test:
    name: Tests
    needs: checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: pharma_admin
          POSTGRES_PASSWORD: pharma_admin
          POSTGRES_DB: pharma_wms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://pharma_admin:pharma_admin@localhost:5432/pharma_wms_test
      DATABASE_URL: postgresql://pharma_admin:pharma_admin@localhost:5432/pharma_wms_test
      SECRET_KEY: ci-secret-key-not-for-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ENVIRONMENT: development
      REGISTER_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run migrations
        run: cd backend && alembic upgrade head

      - name: Run tests
        run: cd backend && python -m pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=85

  # ── Docker Build — параллельно с test ────────────────────────────────────
  docker-build:
    name: Docker Build
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend (production)
        run: docker buildx build --target production ./backend

      - name: Build frontend
        run: docker build ./frontend

