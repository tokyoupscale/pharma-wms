services:
  db-test:
    image: postgres:15
    environment:
      POSTGRES_USER: pharma_admin
      POSTGRES_PASSWORD: pharma_admin
      POSTGRES_DB: pharma_wms_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_admin -d pharma_wms_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  test-runner:
    build:
      context: ./backend
      target: test
    environment:
      TEST_DATABASE_URL: postgresql://pharma_admin:pharma_admin@db-test:5432/pharma_wms_test
      DATABASE_URL: postgresql://pharma_admin:pharma_admin@db-test:5432/pharma_wms_test
      SECRET_KEY: test-secret-key-not-for-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ENVIRONMENT: development
      REGISTER_ENABLED: "false"
    depends_on:
      db-test:
        condition: service_healthy
